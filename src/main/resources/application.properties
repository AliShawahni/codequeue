# ── DATABASE ─────────────────────────────────────────────
# Save the database to a file called codequeue (survives restarts)
spring.datasource.url=jdbc:h2:file:./codequeue

# The driver that connects Java to H2 database
spring.datasource.driver-class-name=org.h2.Driver

# Default credentials for local development
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / HIBERNATE ───────────────────────────────────────
# Create/update tables automatically from your @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Print every SQL query to the console (useful for debugging)
spring.jpa.show-sql=true

# ── H2 CONSOLE ────────────────────────────────────────────
# Enable browser-based DB viewer at localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── SERVER ────────────────────────────────────────────────
# App runs on localhost:8080
server.port=8080

spring.jpa.open-in-view=false
